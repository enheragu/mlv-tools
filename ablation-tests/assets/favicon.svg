<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ablation Tests favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)" stroke="#30363d"/>

    <!-- Branch lines -->
  <line x1="23" y1="27" x2="40" y2="18" stroke="#e6edf3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="23" y1="37" x2="40" y2="46" stroke="#e6edf3" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Root node (left center) -->
  <circle cx="16" cy="32" r="7" fill="#1c2d3f" stroke="#58a6ff" stroke-width="2.5"/>


  <!-- Top child (green — best result) -->
  <circle cx="48" cy="16" r="7" fill="#0d2818" stroke="#3fb950" stroke-width="2.5"/>
  <!-- Bottom child (blue — comparison) -->
  <circle cx="48" cy="48" r="7" fill="#1c2d3f" stroke="#58a6ff" stroke-width="2.5"/>
</svg>
