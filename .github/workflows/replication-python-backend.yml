name: Replication backend checks

on:
  push:
    paths:
      - 'replication-and-comparison/python/**'
      - '.github/workflows/replication-python-backend.yml'
  pull_request:
    paths:
      - 'replication-and-comparison/python/**'
      - '.github/workflows/replication-python-backend.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r replication-and-comparison/python/requirements.txt

      - name: Smoke import app
        run: python -c "import importlib.util; from pathlib import Path; app_path = Path('replication-and-comparison/python/app.py'); spec = importlib.util.spec_from_file_location('replication_backend_app', app_path); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); assert hasattr(mod, 'app'), 'FastAPI app object not found'; print('Backend module imports correctly and exposes app')"
