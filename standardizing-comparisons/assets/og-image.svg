<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Standardizing Comparisons - social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#161b22" stroke="#30363d"/>

  <text x="112" y="156" fill="#58a6ff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Standardizing Comparisons</text>
  <text x="112" y="210" fill="#e6edf3" font-size="45" font-family="Segoe UI, Arial, sans-serif">Align metrics before comparing models</text>

  <!-- Left panel: before standardization — amber curve starts mid-panel (wrong scale) -->
  <g transform="translate(112,264)">
    <rect x="0" y="0" width="464" height="252" rx="16" fill="#0f1725" stroke="#30363d"/>
    <!-- Blue (standardized, starts at top y=20) -->
    <path d="M 20 20 C 80 20, 150 20, 220 126 C 280 232, 380 232, 440 232" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>
    <!-- Amber (not standardized: starts at y=90, different scale — dashed) -->
    <path d="M 20 90 C 80 90, 150 130, 240 172 C 310 210, 380 232, 440 232" fill="none" stroke="#d29922" stroke-width="4" stroke-linecap="round" stroke-dasharray="14 9"/>
  </g>

  <!-- Right panel: after standardization — both curves start at y=20, comparable -->
  <g transform="translate(624,264)">
    <rect x="0" y="0" width="464" height="252" rx="16" fill="#0f1725" stroke="#30363d"/>
    <!-- Blue (steeper drop, same as left) -->
    <path d="M 20 20 C 80 20, 150 20, 220 126 C 280 232, 380 232, 440 232" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>
    <!-- Green (now standardized: starts at y=20, more gradual — clearly comparable) -->
    <path d="M 20 20 C 100 20, 200 60, 300 132 C 380 200, 430 232, 440 232" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
