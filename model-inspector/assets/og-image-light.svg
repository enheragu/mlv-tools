<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Model &amp; Data Inspector - social preview light">
  <style>
    :root {
      --c-bg-1:      #f7fbff;
      --c-bg-2:      #edf3fb;
      --c-surface:   #ffffff;
      --c-card:      #f8fbff;
      --c-border:    #cfd8e3;
      --c-blue:      #2f81f7;
      --c-text:      #1e293b;
      --c-node-root: #dbeafe;
      --c-node-dim:  #e2e8f0;
      --c-line-dim:  #94a3b8;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="var(--c-surface)" stroke="var(--c-border)"/>

  <text x="112" y="156" fill="var(--c-blue)" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Model &amp; Data Inspector</text>
  <text x="112" y="210" fill="var(--c-text)" font-size="45" font-family="Segoe UI, Arial, sans-serif">Architecture and dataset reference</text>

  <!-- Content panel -->
  <rect x="112" y="264" width="976" height="252" rx="16" fill="var(--c-card)" stroke="var(--c-border)"/>

  <!-- Node chain: input → model → output -->
  <circle cx="270" cy="390" r="28" fill="var(--c-node-dim)" stroke="var(--c-line-dim)" stroke-width="3"/>
  <line x1="298" y1="390" x2="572" y2="390" stroke="var(--c-line-dim)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="600" cy="390" r="28" fill="var(--c-node-root)" stroke="var(--c-blue)" stroke-width="3.5"/>
  <line x1="628" y1="390" x2="902" y2="390" stroke="var(--c-line-dim)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="930" cy="390" r="28" fill="var(--c-node-dim)" stroke="var(--c-line-dim)" stroke-width="3"/>

  <!-- Magnifying glass centred on the highlighted node -->
  <circle cx="600" cy="390" r="110" fill="#2f81f706" stroke="var(--c-blue)" stroke-width="7"/>
  <line x1="680" y1="468" x2="756" y2="542" stroke="var(--c-blue)" stroke-width="14" stroke-linecap="round"/>
</svg>
