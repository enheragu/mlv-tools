<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Model Inspector favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)" stroke="#30363d"/>
  <!-- Lens circle -->
  <circle cx="27" cy="27" r="14" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
  <!-- Model layer bars inside lens -->
  <rect x="20" y="20" width="14" height="2.5" rx="1" fill="#3fb950"/>
  <rect x="22" y="25.5" width="10" height="2.5" rx="1" fill="#3fb950"/>
  <rect x="20" y="31" width="14" height="2.5" rx="1" fill="#3fb950"/>
  <!-- Handle -->
  <line x1="38" y1="38" x2="52" y2="52" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
</svg>
