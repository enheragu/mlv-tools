<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Model &amp; Data Inspector - social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#161b22" stroke="#30363d"/>

  <text x="112" y="156" fill="#58a6ff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Model &amp; Data Inspector</text>
  <text x="112" y="210" fill="#e6edf3" font-size="45" font-family="Segoe UI, Arial, sans-serif">Architecture and dataset reference</text>

  <!-- Content panel -->
  <rect x="112" y="264" width="976" height="252" rx="16" fill="#0f1725" stroke="#30363d"/>

  <!-- Node chain: input → model → output -->
  <circle cx="270" cy="390" r="28" fill="#161b22" stroke="#30363d" stroke-width="3"/>
  <line x1="298" y1="390" x2="572" y2="390" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <circle cx="600" cy="390" r="28" fill="#1c2d3f" stroke="#58a6ff" stroke-width="3.5"/>
  <line x1="628" y1="390" x2="902" y2="390" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <circle cx="930" cy="390" r="28" fill="#161b22" stroke="#30363d" stroke-width="3"/>

  <!-- Magnifying glass centred on the highlighted node -->
  <circle cx="600" cy="390" r="110" fill="#58a6ff06" stroke="#58a6ff" stroke-width="7"/>
  <line x1="680" y1="468" x2="756" y2="542" stroke="#58a6ff" stroke-width="14" stroke-linecap="round"/>
</svg>
