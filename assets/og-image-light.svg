<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ML Variance Analysis Tools light preview">
  <style>
    :root {
      --c-bg-1:       #f4f6f9;
      --c-bg-2:       #e8ecf2;
      --c-surface:    #ffffff;
      --c-card:       #f4f6f9;
      --c-border:     #dde1e7;
      --c-text:       #3a4658;
      --c-blue:       #58a6ff;
      --c-green:      #3fb950;
      --c-red:        #f85149;
      --c-amber:      #d29922;
      --c-gray:       #6e7681;
      --c-purple:     #bc8cff;
      --c-cyan:       #79c0ff;
      --c-node-root:  #dbeafe;
      --c-node-green: #dcfce7;
      --c-node-red:   #fee2e2;
      --c-node-dim:   #e2e8f0;
      --c-line-dim:   #94a3b8;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--c-bg-1)"/>
      <stop offset="100%" stop-color="var(--c-bg-2)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="var(--c-surface)" stroke="var(--c-border)"/>

  <text x="112" y="156" fill="var(--c-blue)" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">ML Variance Analysis Tools</text>
  <text x="112" y="210" fill="var(--c-text)" font-size="45" font-family="Segoe UI, Arial, sans-serif">Machine learning variance analysis tools</text>

  <!-- Card 1: Model & Data Inspector -->
  <g transform="translate(112,264)">
    <rect x="0" y="0" width="312" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>
    <!-- 4×3 data grid — 48×38 cells, 10px gap, 45px margins (centered) -->
    <rect x="45"  y="59"  width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="103" y="59"  width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="161" y="59"  width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="219" y="59"  width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="45"  y="107" width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="103" y="107" width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-green)"    stroke-width="3"/>
    <rect x="161" y="107" width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-green)"    stroke-width="3"/>
    <rect x="219" y="107" width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="45"  y="155" width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="103" y="155" width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="161" y="155" width="48" height="38" rx="5" fill="var(--c-node-root)" stroke="var(--c-line-dim)" stroke-width="2"/>
    <rect x="219" y="155" width="48" height="38" rx="5" fill="var(--c-node-dim)"  stroke="var(--c-line-dim)" stroke-width="2"/>
    <!-- Magnifying glass -->
    <circle cx="156" cy="126" r="64" fill="#58a6ff06" stroke="var(--c-blue)" stroke-width="5"/>
    <line x1="201" y1="171" x2="242" y2="212" stroke="var(--c-blue)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Card 2: Replication and Comparison — 36px margins, lines at own peaks -->
  <g transform="translate(444,264)">
    <rect x="0" y="0" width="312" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>
    <!-- shifted +16px: blue x=36–236, green x=72–276 -->
    <path d="M 36 199 C 74 199, 102 53, 136 53 C 170 53, 198 199, 236 199" fill="none" stroke="var(--c-blue)"  stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 72 199 C 108 199, 126 91, 171 91 C 216 91, 234 199, 276 199" fill="none" stroke="var(--c-green)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="136" y1="199" x2="136" y2="114" stroke="var(--c-green)" stroke-width="3" opacity="0.7"/>
    <line x1="171" y1="199" x2="171" y2="93"  stroke="var(--c-blue)"  stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Card 3: Ablation Tests -->
  <g transform="translate(776,264)">
    <rect x="0" y="0" width="312" height="252" rx="12" fill="var(--c-card)" stroke="var(--c-border)"/>
    <line x1="91" y1="119" x2="217" y2="78"  stroke="var(--c-green)"   stroke-width="3" stroke-linecap="round"/>
    <line x1="91" y1="133" x2="217" y2="174" stroke="var(--c-line-dim)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="238" cy="71"  r="22" fill="var(--c-node-green)" stroke="var(--c-green)"   stroke-width="3"/>
    <circle cx="238" cy="181" r="22" fill="var(--c-node-dim)"   stroke="var(--c-line-dim)" stroke-width="3"/>
    <circle cx="70"  cy="126" r="22" fill="var(--c-node-root)"  stroke="var(--c-blue)"    stroke-width="3"/>
  </g>
</svg>
